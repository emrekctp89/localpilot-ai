name: Keep Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  warm-ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check monitoring gate
        id: gate
        env:
          AI_SERVICE_URL: ${{ vars.AI_SERVICE_URL }}
        run: |
          if [ "${{ vars.PRODUCTION_MONITORING_ENABLED }}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Keep-warm atlandı (PRODUCTION_MONITORING_ENABLED != true)."
            exit 0
          fi
          if [ -z "$AI_SERVICE_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AI_SERVICE_URL tanımlı değil. Settings → Secrets and variables → Actions → Variables"
            exit 0
          fi
          TRIMMED="$(printf '%s' "$AI_SERVICE_URL" | tr -d '[:space:]')"
          if [ "$AI_SERVICE_URL" != "$TRIMMED" ]; then
            echo "::warning::AI_SERVICE_URL başında/sonunda boşluk var. Variable değerini düzeltin."
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Ping AI service health
        if: steps.gate.outputs.enabled == 'true'
        env:
          AI_SERVICE_URL: ${{ vars.AI_SERVICE_URL }}
        run: |
          source .github/scripts/normalize-url.sh
          HEALTH_URL="$(build_health_url "$AI_SERVICE_URL")"
          echo "Pinging: ${HEALTH_URL}"
          curl --fail --silent --show-error --retry 5 --retry-delay 8 \
            --retry-all-errors \
            --max-time 90 \
            "${HEALTH_URL}"
          echo "AI service keep-warm ping succeeded."