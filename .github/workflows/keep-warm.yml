name: Keep Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  warm-ai-service:
    runs-on: ubuntu-latest
    steps:
      - name: Ping AI service health
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            --max-time 45 \
            "https://localpilot-ai-service.onrender.com/health"
          echo "AI service keep-warm ping succeeded."