name: Keep Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  warm-ai-service:
    runs-on: ubuntu-latest
    steps:
      - name: Check monitoring gate
        id: gate
        run: |
          if [ "${{ vars.PRODUCTION_MONITORING_ENABLED }}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Production monitoring kapalı. Repo Variables: PRODUCTION_MONITORING_ENABLED=true, AI_SERVICE_URL"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping AI service health
        if: steps.gate.outputs.enabled == 'true'
        env:
          AI_SERVICE_URL: ${{ vars.AI_SERVICE_URL }}
        run: |
          if [ -z "$AI_SERVICE_URL" ]; then
            echo "::error::AI_SERVICE_URL repository variable tanımlı değil."
            exit 1
          fi
          curl --fail --silent --show-error --retry 5 --retry-delay 8 \
            --retry-all-errors \
            --max-time 90 \
            "${AI_SERVICE_URL%/}/health"
          echo "AI service keep-warm ping succeeded."