name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check AI service health
        run: |
          curl --fail --retry 3 --retry-delay 5 \
            "https://localpilot-ai-service.onrender.com/health"

      - name: Check frontend home
        run: |
          curl --fail --retry 3 --retry-delay 5 \
            "https://localpilot-ai-1b2h.vercel.app"