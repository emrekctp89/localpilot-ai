name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check monitoring gate
        id: gate
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          if [ "${{ vars.PRODUCTION_MONITORING_ENABLED }}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Production smoke atlandı (PRODUCTION_MONITORING_ENABLED != true)."
            exit 0
          fi
          if [ -z "${{ vars.AI_SERVICE_URL }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AI_SERVICE_URL tanımlı değil. Settings → Secrets and variables → Actions → Variables"
            exit 0
          fi
          if [ -z "${{ vars.FRONTEND_URL }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FRONTEND_URL tanımlı değil. Settings → Secrets and variables → Actions → Variables"
            exit 0
          fi
          TRIMMED="$(printf '%s' "$FRONTEND_URL" | tr -d '[:space:]')"
          if [ "$FRONTEND_URL" != "$TRIMMED" ]; then
            echo "::warning::FRONTEND_URL başında/sonunda boşluk var. Variable değerini düzeltin."
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Check AI service health
        if: steps.gate.outputs.enabled == 'true'
        env:
          AI_SERVICE_URL: ${{ vars.AI_SERVICE_URL }}
        run: |
          source .github/scripts/normalize-url.sh
          HEALTH_URL="$(build_health_url "$AI_SERVICE_URL")"
          echo "Pinging: ${HEALTH_URL}"
          response=$(curl --fail --retry 5 --retry-delay 8 --retry-all-errors -s --max-time 90 \
            "${HEALTH_URL}")
          echo "$response"
          echo "$response" | jq -e '.service == "localpilot-ai"'
          echo "$response" | jq -e '.checks.supabase == true'
          echo "$response" | jq -e '.status == "ok" or .status == "degraded"'

      - name: Check CORS preflight from production frontend
        if: steps.gate.outputs.enabled == 'true'
        env:
          AI_SERVICE_URL: ${{ vars.AI_SERVICE_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          source .github/scripts/normalize-url.sh
          HEALTH_URL="$(build_health_url "$AI_SERVICE_URL")"
          FRONTEND_BASE="$(normalize_url "$FRONTEND_URL")"
          validate_http_url "$FRONTEND_BASE" "FRONTEND_URL"
          echo "CORS origin: ${FRONTEND_BASE}"
          status=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS \
            -H "Origin: ${FRONTEND_BASE}" \
            -H "Access-Control-Request-Method: GET" \
            "${HEALTH_URL}")
          echo "CORS preflight status: $status"
          if [ "$status" != "200" ] && [ "$status" != "204" ]; then
            echo "::error::CORS preflight başarısız (${status}). Render → FRONTEND_URL ve ALLOWED_ORIGINS, GitHub → FRONTEND_URL aynı Vercel domain olmalı."
            exit 1
          fi

      - name: Check frontend home
        if: steps.gate.outputs.enabled == 'true'
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          source .github/scripts/normalize-url.sh
          FRONTEND_BASE="$(normalize_url "$FRONTEND_URL")"
          validate_http_url "$FRONTEND_BASE" "FRONTEND_URL"
          echo "Frontend home: ${FRONTEND_BASE}"
          curl --fail --retry 3 --retry-delay 5 --max-time 60 "${FRONTEND_BASE}"

      - name: Check frontend pricing page
        if: steps.gate.outputs.enabled == 'true'
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          source .github/scripts/normalize-url.sh
          FRONTEND_BASE="$(normalize_url "$FRONTEND_URL")"
          validate_http_url "$FRONTEND_BASE" "FRONTEND_URL"
          echo "Frontend pricing: ${FRONTEND_BASE}/fiyatlandirma"
          curl --fail --retry 3 --retry-delay 5 --max-time 60 "${FRONTEND_BASE}/fiyatlandirma"

      - name: Check frontend auth page
        if: steps.gate.outputs.enabled == 'true'
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          source .github/scripts/normalize-url.sh
          FRONTEND_BASE="$(normalize_url "$FRONTEND_URL")"
          curl --fail --retry 3 --retry-delay 5 --max-time 60 "${FRONTEND_BASE}/auth"

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (Playwright live)
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Playwright live public surfaces
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ vars.FRONTEND_URL }}
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: npm run test:e2e:live

      - name: Playwright mobile live smoke
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ vars.FRONTEND_URL }}
        run: npm run test:e2e:mobile