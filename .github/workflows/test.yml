name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Smoke tests
        run: npm run test:smoke

      - name: Integration tests
        run: npm run test:integration

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests (auth guard)
        run: npm run test:e2e -- e2e/auth-guard.spec.ts
        env:
          CI: true

  e2e-authenticated:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_TEST_EMAIL != '' && secrets.E2E_TEST_PASSWORD != '' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests (authenticated dashboard)
        run: npm run test:e2e -- e2e/dashboard.spec.ts e2e/decision-center.spec.ts
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_HAS_BUSINESS: ${{ secrets.E2E_TEST_HAS_BUSINESS }}

      - name: E2E tests (appointment flow)
        if: ${{ secrets.E2E_TEST_HAS_BUSINESS == 'true' }}
        run: npm run test:e2e -- e2e/appointment.spec.ts
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_HAS_BUSINESS: true

  e2e-public-site:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_PUBLIC_BUSINESS_ID != '' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests (public mini site)
        run: npm run test:e2e -- e2e/public-site.spec.ts
        env:
          CI: true
          E2E_PUBLIC_BUSINESS_ID: ${{ secrets.E2E_PUBLIC_BUSINESS_ID }}

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Security unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v