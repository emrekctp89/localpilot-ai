name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Smoke tests
        run: npm run test:smoke

      - name: Integration tests
        run: npm run test:integration

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests (auth guard)
        run: npm run test:e2e -- e2e/auth-guard.spec.ts
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder
          NEXT_PUBLIC_AI_SERVICE_URL: https://localpilot-ai-service.onrender.com

  e2e-authenticated:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Skip when E2E credentials are not configured
        id: e2e_auth_gate
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_HAS_BUSINESS: ${{ secrets.E2E_TEST_HAS_BUSINESS }}
        run: |
          if [ -z "$E2E_TEST_EMAIL" ] || [ -z "$E2E_TEST_PASSWORD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "E2E credentials not configured; skipping authenticated suite."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$E2E_TEST_HAS_BUSINESS" = "true" ]; then
            echo "has_business=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_business=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.e2e_auth_gate.outputs.skip != 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.e2e_auth_gate.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.e2e_auth_gate.outputs.skip != 'true'
        run: npx playwright install chromium --with-deps

      - name: E2E tests (authenticated dashboard)
        if: steps.e2e_auth_gate.outputs.skip != 'true'
        run: npm run test:e2e -- e2e/dashboard.spec.ts e2e/decision-center.spec.ts
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_HAS_BUSINESS: ${{ secrets.E2E_TEST_HAS_BUSINESS }}

      - name: E2E tests (appointment flow)
        if: steps.e2e_auth_gate.outputs.skip != 'true' && steps.e2e_auth_gate.outputs.has_business == 'true'
        run: npm run test:e2e -- e2e/appointment.spec.ts
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_HAS_BUSINESS: true

  e2e-public-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Skip when public site business id is not configured
        id: e2e_public_gate
        env:
          E2E_PUBLIC_BUSINESS_ID: ${{ secrets.E2E_PUBLIC_BUSINESS_ID }}
        run: |
          if [ -z "$E2E_PUBLIC_BUSINESS_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "E2E_PUBLIC_BUSINESS_ID not configured; skipping public site suite."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.e2e_public_gate.outputs.skip != 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.e2e_public_gate.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.e2e_public_gate.outputs.skip != 'true'
        run: npx playwright install chromium --with-deps

      - name: E2E tests (public mini site)
        if: steps.e2e_public_gate.outputs.skip != 'true'
        run: npm run test:e2e -- e2e/public-site.spec.ts
        env:
          CI: true
          E2E_PUBLIC_BUSINESS_ID: ${{ secrets.E2E_PUBLIC_BUSINESS_ID }}

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Security unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v