name: Verify Supabase Schema

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/verify-schema.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check credentials gate
        id: gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Schema verify atlandı. GitHub Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: Run remote schema verification
        if: steps.gate.outputs.skip != 'true'
        working-directory: ai-service
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ../supabase/scripts/verify_schema_remote.py