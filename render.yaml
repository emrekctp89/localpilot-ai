services:
  - type: web
    name: localpilot-ai-service
    runtime: docker
    rootDir: ai-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AI_SERVICE_REQUIRE_AUTH
        value: true
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_SERVICE_API_KEY
        sync: false